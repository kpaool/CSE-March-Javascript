<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Javascript</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css"
        integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">

    <style>
        .btn {
            transition: all 0.5s ease-in-out;
        }

        .scale {
            transform: scale(1.2);
            background-color: red;
        }
    </style>

</head>

<body>

    <div class="container p-16 py-16">

        <img src="https://refactory.academy/wp-content/uploads/2025/07/Refactory-Logo.png" height="150px" width="auto"
            alt="Refactory">

        <h1 id="heading" class="font-xl text-primary">
            Learning the DOM
        </h1>


        <div class="row">
            <div class="col-md-12">
                <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Quisquam, quod.</p>
            </div>
        </div>

        <div class="row">
            <div class="col-3">
                <button class="btn btn-primary" id="clickme">Click me</button>
                <button class="btn btn-danger" onclick="//alert('You clicked the button')">Close</button>
            </div>
        </div>
        <div class="row">
            <ol>
                <li>Mix the dry ingredients</li>
                <li>Add the wet ingredients</li>
                <li>Bake for 30 minutes</li>
            </ol>
        </div>

        <div class="row">
            <div class="col-12">
                <table border="1">
                    <tr>
                        <th>#</th>
                        <th>Customer name</th>
                        <th>Customer Age</th>
                    </tr>
                    <tbody id="body">
                        <tr>
                            <td>1</td>
                            <td>Irene</td>
                            <td>25</td>
                        </tr>
                        <tr>
                            <td>2</td>
                            <td>Faith</td>
                            <td>25</td>
                        </tr>
                        <tr>
                            <td>3</td>
                            <td>Tendo</td>
                            <td>25</td>
                        </tr>
                    </tbody>

                </table>
            </div>
        </div>

        <div class="row my-4">
            <div class="col-12">
                <form>

                    <input type="text" placeholder="Username" id="username">
                    <input type="password" placeholder="Password" id="password">
                    <input type="text" placeholder="NIN" id="nin">

                    <button type="submit">Submit</button>

                </form>
            </div>
        </div>

    </div>


    <script>


        let table = localStorage.getItem("table")
        table = JSON.parse(table)
        console.log(table)

        let tableRows = ""
        let tableBody = document.querySelector("#body")

        table.forEach((item, index) => {

            let tr = document.createElement("tr")
            let td_number = document.createElement("td")
            let td_name = document.createElement("td")
            let td_age = document.createElement("td")

            td_number.textContent = index + 1
            td_name.textContent = item.name
            td_age.textContent = item.age

            tr.appendChild(td_number)
            tr.appendChild(td_name)
            tr.appendChild(td_age)

            tableBody.appendChild(tr)

        })

        // console.log(tableRows)
        console.log(tableBody)







        let newDiv = document.createElement("div")
        // newDiv.textContent = "Hello, I am a new div"

        // document.querySelector("#clickme").appendChild(newDiv)





    </script>

    <script src="assets/js/index.js"></script>

</body>

</html>
