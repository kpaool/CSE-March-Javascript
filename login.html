<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN PAGE</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>


    <form autocomplete="off" class="w-full h-full p-4 mx-auto flex flex-col justify-center align-center">

        <div class="w-full my-4">
            <label for="username">Username</label>
            <input id="username" autocomplete="off" name="username" class="px-2 py-1 rounded text-lg" type="text" placeholder="Username">
        </div>

        <div class="w-full my-4">
            <label for="password">Password</label>
            <input id="password" class="px-2 py-1 rounded text-lg" type="password" placeholder="Password">
        </div>

        <button class="text-white text-xl bg-orange-500 px-4 py-2 rounded-lg" type="submit">Login</button>

    </form>


    <script src="assets/js/login.js"></script>
</body>

</html>
